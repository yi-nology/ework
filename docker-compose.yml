version: '3.8'

services:
  ework-nav:
    build: .
    container_name: ework-nav
    ports:
      - "8080:80"
    restart: unless-stopped
    volumes:
      - ./nav-data.json:/usr/share/nginx/html/nav-data.json:ro
    environment:
      - DATA_MODE=remote
      - CONFIG_TYPE=rainbow-bridge
      - RB_BASE_URL=/rainbow-bridge
      - RB_ENVIRONMENT=navi
      - LOCAL_DATA_URL=/nav-data.json
      - NACOS_SERVER_ADDR=http://nacos:8848/nacos
      - NACOS_NAMESPACE=public
      - NACOS_DATA_ID=ework-nav.json
      - NACOS_GROUP=DEFAULT_GROUP
      - APOLLO_META=http://apollo:8080
      - APOLLO_APP_ID=ework-nav
      - APOLLO_NAMESPACE=application
      - SKIP_SSL_VERIFY=true

  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: ework-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      - MODE=standalone
      - SPRING_DATASOURCE_PLATFORM=embedded
    restart: unless-stopped
    profiles:
      - nacos

  apollo:
    image: apolloconfig/apollo-quick-start:2.1.0
    container_name: ework-apollo
    ports:
      - "8070:8070"
      - "8080:8080"
      - "8090:8090"
    restart: unless-stopped
    profiles:
      - apollo
